<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>To-Do</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: #EDEAE3;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: #FFFFFF;
    box-shadow: 0 1px 0 rgba(43,43,46,0.06), 0 12px 24px -8px rgba(43,43,46,0.18);
    transform: rotate(-0.4deg);
  }

  .head {
    position: relative;
    padding: 24px 28px 20px;
    border-bottom: 1.5px dashed #C8C3B8;
  }
  .holes { display: flex; gap: 8px; margin-bottom: 16px; }
  .hole {
    display: block;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #EDEAE3;
    box-shadow: inset 0 0 0 1px #C8C3B8;
  }
  h1 {
    margin: 0;
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 26px;
    letter-spacing: 0.04em;
    color: #2B2B2E;
  }
  .date {
    margin: 2px 0 0;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #9A9488;
  }

  .list { padding: 0 28px; }
  .empty {
    padding: 32px 0;
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: #B0AB9F;
    font-size: 15px;
  }

  .task {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid #EEEBE3;
  }

  .checkbox {
    flex-shrink: 0;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1.5px solid #C8C3B8;
    background: transparent;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s ease;
  }
  .checkbox.done {
    border-color: #B23A48;
    background: #B23A48;
  }
  .checkbox svg { display: none; }
  .checkbox.done svg { display: block; }

  .task-text {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #2B2B2E;
    cursor: pointer;
    user-select: none;
  }
  .task-text.done {
    color: #B0AB9F;
    text-decoration: line-through;
    text-decoration-color: #C8C3B8;
  }

  .delete-btn {
    background: none;
    border: none;
    color: #B0AB9F;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s ease;
    padding: 2px;
    display: flex;
  }
  .task:hover .delete-btn { opacity: 1; }

  .add-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 28px;
  }
  .add-row.bordered { border-top: 1.5px dashed #C8C3B8; }
  .add-row svg { flex-shrink: 0; }
  .add-row input {
    flex: 1;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    color: #2B2B2E;
    background: transparent;
    border: none;
    outline: none;
    width: 100%;
  }
  .add-row input::placeholder { color: #B0AB9F; }

  .footer {
    display: flex;
    justify-content: flex-end;
    padding: 4px 28px 24px;
  }
  .stamp {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: #B23A48;
    border: 1.5px solid #B23A48;
    padding: 3px 10px;
    transform: rotate(-3deg);
  }
</style>
</head>
<body>

<div class="card">
  <div class="head">
    <div class="holes">
      <span class="hole"></span>
      <span class="hole"></span>
    </div>
    <h1>TO&nbsp;&nbsp;DO</h1>
    <p class="date" id="date"></p>
  </div>

  <div class="list" id="list"></div>

  <div class="add-row" id="addRow">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#B23A48" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    <input id="draftInput" type="text" placeholder="add a task..." />
  </div>

  <div class="footer">
    <div class="stamp" id="stamp">0 LEFT</div>
  </div>
</div>

<script>
  let tasks = [
    { id: 1, text: "Water the plants", done: true },
    { id: 2, text: "Reply to Priya's email", done: false },
    { id: 3, text: "Pick up dry cleaning", done: false },
  ];
  let nextId = 4;

  const listEl = document.getElementById('list');
  const addRowEl = document.getElementById('addRow');
  const draftInput = document.getElementById('draftInput');
  const stampEl = document.getElementById('stamp');
  const dateEl = document.getElementById('date');

  dateEl.textContent = new Date().toLocaleDateString(undefined, { weekday: "long", month: "short", day: "numeric" });

  const checkSvg = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const xSvg = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;

  function render() {
    addRowEl.classList.toggle('bordered', tasks.length > 0);

    if (tasks.length === 0) {
      listEl.innerHTML = `<p class="empty">Nothing on the list. Add something below.</p>`;
    } else {
      listEl.innerHTML = tasks.map(t => `
        <div class="task" data-id="${t.id}">
          <button class="checkbox ${t.done ? 'done' : ''}" data-action="toggle" data-id="${t.id}" aria-label="${t.done ? 'Mark as not done' : 'Mark as done'}">
            ${checkSvg}
          </button>
          <span class="task-text ${t.done ? 'done' : ''}" data-action="toggle" data-id="${t.id}">${escapeHtml(t.text)}</span>
          <button class="delete-btn" data-action="delete" data-id="${t.id}" aria-label="Delete task">${xSvg}</button>
        </div>
      `).join('');
    }

    const remaining = tasks.filter(t => !t.done).length;
    stampEl.textContent = remaining === 0 ? "ALL DONE" : `${remaining} LEFT`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function addTask() {
    const text = draftInput.value.trim();
    if (!text) return;
    tasks.push({ id: nextId++, text, done: false });
    draftInput.value = "";
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    render();
  }

  listEl.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const id = Number(btn.dataset.id);
    if (btn.dataset.action === 'toggle') toggleTask(id);
    if (btn.dataset.action === 'delete') deleteTask(id);
  });

  draftInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>

</body>
</html>
